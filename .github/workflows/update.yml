name: Update sources

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-sources

jobs:
  update:
    runs-on: macos-latest
    outputs:
      changed: ${{ env.COMMIT_MSG != null && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Update sources with nvfetcher
        id: nvfetcher
        run: |
          keyfile="$RUNNER_TEMP/nvchecker-keyfile.toml"
          cat > "$keyfile" <<EOF
          [keys]
          github = "${{ github.token }}"
          EOF

          set +e
          output=$(nix develop --command nvfetcher -k "$keyfile" 2>&1)
          status=$?
          set -e

          rm -f "$keyfile"

          echo "$output"

          if [ "$status" -ne 0 ]; then
            echo "nvfetcher failed with exit code $status" >&2
            exit "$status"
          fi

          changes=$(printf '%s\n' "$output" | awk 'seen { if (NF) print; next } /^Changes:$/ { seen = 1 }')
          if [ -z "$changes" ]; then
            echo "No changes detected"
            exit 0
          fi
          count=$(echo "$changes" | wc -l | tr -d ' ')
          if [ "$count" -eq 1 ]; then
            msg="$changes"
          else
            names=$(printf '%s\n' "$changes" | cut -d: -f1 | sed -E 's/-(x86_64|aarch64)-(linux|darwin)$//' | sort -u)
            unique_count=$(echo "$names" | wc -l | tr -d ' ')
            if [ "$unique_count" -eq 1 ]; then label="package"; else label="packages"; fi
            if [ "$unique_count" -le 3 ]; then
              name_list=$(echo "$names" | paste -sd ',' - | sed 's/,/, /g')
            else
              name_list="$(echo "$names" | head -3 | paste -sd ',' - | sed 's/,/, /g') & more"
            fi
            msg=$(printf "%s %s updated: %s\n\n%s" "$unique_count" "$label" "$name_list" "$changes")
          fi
          {
            echo "COMMIT_MSG<<EOF"
            echo "$msg"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Stage source changes for flake eval
        if: ${{ env.COMMIT_MSG != null }}
        run: git add _sources

      - name: Update package list in README
        if: ${{ env.COMMIT_MSG != null }}
        run: ./scripts/update-readme.sh x86_64-linux

      - name: Commit changes
        if: ${{ env.COMMIT_MSG != null }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: ${{ env.COMMIT_MSG }}
          file_pattern: "_sources/* README.md"

  check:
    needs: update
    if: ${{ needs.update.outputs.changed == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Check flake
        run: nix flake check
